services:
  discord-bot:
    build: .
    container_name: discord-bot
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      bot-postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot-postgres:
    image: postgres:15
    container_name: bot-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_password
      POSTGRES_DB: bot_db
    volumes:
      - bot_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot_user -d bot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bot_postgres_data:
